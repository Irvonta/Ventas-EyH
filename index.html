<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- 👇 Clave para que el responsive funcione en celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretería</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <!-- Logo izquierda -->
  <div class="logo">
    <img src="img/logo.png" alt="Logo Empresa">
  </div>
  
  <!-- Buscador centro -->
  <div class="search">
    <input type="text" id="busqueda" placeholder="Buscar productos...">
  </div>
  
  <!-- Carrito derecha con contador -->
  <div class="carrito-icono">
    <button id="btnCarrito">🛒</button>
    <span id="carrito-count">0</span>
  </div>
</header>

<!-- Popup del carrito -->
<div id="carrito-popup" class="carrito-popup">
  <h3>Carrito de compra</h3>
  <button id="cerrar-carrito">✖</button>
  <div id="carrito-items"></div>
  <div class="subtotal">Subtotal: $<span id="subtotal">0</span></div>
  <div class="iva">IVA (16%): $<span id="iva">0</span></div>
  <div class="total">Total: $<span id="total">0</span></div>
  <div class="cliente-box">
    <label for="nombre-cliente">
        Nombre del cliente
    </label>

    <input
        type="text"
        id="nombre-cliente"
        placeholder="Escribe tu nombre"
    >
</div>

<div class="cliente-box">
    <label for="agente">
        Agente de ventas
    </label>

   <select id="agente">
    <option value="DIRECTO">Pedido Directo</option>
    <option value="Ricardo">Ricardo</option>
    <option value="Damian">Damian</option>
</select>
</div>

<div class="acciones-carrito">
  <button id="eliminar-carrito" class="btn-eliminar">
    <img src="img/basura.png" alt="Eliminar carrito" style="width:24px;height:24px;">
  </button>
  <button id="finalizar">
    <img src="img/siguiente.png" alt="Enviar pedido" style="width:24px;height:24px;">
  </button>
  
</div>
</div> 

<main id="contenido">
    <section id="productos"></section>
</main>












<main id="contenido">
    <section id="productos"></section>
</main>








<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
